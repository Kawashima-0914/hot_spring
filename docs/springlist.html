                <p>
                    約1300の温泉地を表示するページです。
                    <br>下の日本地図から、それぞれの県の温泉を表示することができます。
                    <br>さらに個別の温泉にアクセスすることで、その温泉に似ている温泉を探すこともできます。
                    <br>第1に泉質、それ以降に効能や特徴を参考に温泉の類似度を出しています。
                    <br>泉質の一致する数が多いほど、類似度は高くなるようになっています。
                    <br>同じ温泉同士でも、類似度に若干の誤差があることご理解お願いします。
                </p>
